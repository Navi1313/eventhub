services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_NAME=eventdb
      - DB_USER=eventhub
      - DB_PASSWORD=eventhub
      - DB_HOST=db
      - DB_PORT=5432
volumes:
  postgres_data: